<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC55E"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#9C3A00" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 背景（フルブリード・iOS側で角丸マスクされる） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- 飛んでいる唇（白・分厚め）＋唇から伸びる流線 -->
  <g transform="rotate(-6 560 510)" filter="url(#soft)">

    <!-- 唇から後ろへ流れる線 -->
    <g stroke="#FFFFFF" stroke-width="46" stroke-linecap="round">
      <line x1="352" y1="416" x2="128" y2="416"/>
      <line x1="336" y1="506" x2="64"  y2="506"/>
      <line x1="356" y1="596" x2="168" y2="596"/>
    </g>

    <!-- 唇本体（「あ」の口・口角少しアップ・口の中はくり抜きで背景が見える） -->
    <path fill-rule="evenodd"
          d="M 322 470
             C 360 400, 420 360, 505 360
             C 548 360, 582 380, 612 388
             C 642 380, 676 360, 719 360
             C 804 360, 864 400, 902 470
             C 862 586, 748 658, 612 658
             C 476 658, 362 586, 322 470
             Z
             M 430 484
             C 470 436, 534 418, 618 418
             C 706 418, 772 436, 814 484
             C 782 550, 710 582, 618 582
             C 526 582, 462 550, 430 484
             Z"
          fill="#FFFFFF"/>
  </g>
</svg>
