<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC55E"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <linearGradient id="lips" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF6D55"/>
      <stop offset="1" stop-color="#E23A28"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B34A00" flood-opacity="0.28"/>
    </filter>
    <clipPath id="mouthClip">
      <rect x="352" y="330" width="320" height="272" rx="132"/>
    </clipPath>
  </defs>

  <!-- 背景（フルブリード・iOS側で角丸マスクされる） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- スピード線（太く・長く・くっきり） -->
  <g stroke="#FFFFFF" stroke-width="52" stroke-linecap="round">
    <line x1="30"  y1="368" x2="168" y2="380"/>
    <line x1="58"  y1="470" x2="164" y2="474"/>
    <line x1="86"  y1="572" x2="168" y2="566"/>
  </g>
  <g stroke="#FFE3B8" stroke-width="30" stroke-linecap="round" opacity="0.9">
    <line x1="120" y1="668" x2="210" y2="652"/>
  </g>

  <!-- 吹き出し＋口（わずかに傾けて勢いを出す） -->
  <g transform="rotate(-5 512 462)">
    <g filter="url(#soft)">
      <path d="M 342 232
               h 340
               a 150 150 0 0 1 150 150
               v 160
               a 150 150 0 0 1 -150 150
               h -270
               l -108 118
               q -18 20 -14 -14
               l 12 -104
               a 150 150 0 0 1 -110 -145
               v -165
               a 150 150 0 0 1 150 -150
               z"
            fill="#FFFFFF"/>
    </g>

    <!-- 唇（キューピッドボウのある上唇＋ふっくら下唇・少し開いて話し中） -->
    <g>
      <!-- 上唇 -->
      <path d="M 320 468
               C 348 396, 416 350, 468 376
               C 492 388, 502 396, 512 396
               C 522 396, 532 388, 556 376
               C 608 350, 676 396, 704 468
               C 640 462, 576 458, 512 458
               C 448 458, 384 462, 320 468
               Z"
            fill="url(#lips)"/>
      <!-- 下唇 -->
      <path d="M 320 468
               C 356 574, 452 610, 512 610
               C 572 610, 668 574, 704 468
               C 640 496, 576 508, 512 508
               C 448 508, 384 496, 320 468
               Z"
            fill="url(#lips)"/>
      <!-- 開いた口の中（話し中の隙間） -->
      <path d="M 320 468
               C 384 462, 448 458, 512 458
               C 576 458, 640 462, 704 468
               C 640 496, 576 508, 512 508
               C 448 508, 384 496, 320 468
               Z"
            fill="#7E2415"/>
    </g>
  </g>
</svg>
