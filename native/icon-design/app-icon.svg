<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC55E"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFA033"/>
      <stop offset="1" stop-color="#FF6414"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#B34A00" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- 背景（フルブリード・iOS側で角丸マスクされる） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- スピード線（吹き出しが右へ飛び出す勢い） -->
  <g stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" opacity="0.75">
    <line x1="64"  y1="392" x2="176" y2="392"/>
    <line x1="96"  y1="472" x2="176" y2="472"/>
    <line x1="124" y1="552" x2="176" y2="552"/>
  </g>

  <!-- 吹き出し -->
  <g filter="url(#soft)">
    <path d="M 342 232
             h 340
             a 150 150 0 0 1 150 150
             v 160
             a 150 150 0 0 1 -150 150
             h -270
             l -108 118
             q -18 20 -14 -14
             l 12 -104
             a 150 150 0 0 1 -110 -145
             v -165
             a 150 150 0 0 1 150 -150
             z"
          fill="#FFFFFF"/>
  </g>

  <!-- 稲妻（速さ・エネルギー） -->
  <path d="M 560 300
           L 432 492
           L 508 492
           L 462 630
           L 604 434
           L 522 434
           L 584 300
           Z"
        fill="url(#bolt)"/>
</svg>
