<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFC55E"/>
      <stop offset="1" stop-color="#FF8A3D"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#B34A00" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- 背景（フルブリード・iOS側で角丸マスクされる） -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- スピード線（左から言葉が飛んでくる勢い） -->
  <g stroke="#FFFFFF" stroke-width="46" stroke-linecap="round" opacity="0.95">
    <line x1="36"  y1="330" x2="150" y2="342"/>
    <line x1="66"  y1="430" x2="146" y2="436"/>
    <line x1="92"  y1="530" x2="142" y2="528"/>
  </g>

  <!-- 唇（主役・白・ワイドでフラットなアイコン調） -->
  <g transform="rotate(-4 560 516)" filter="url(#soft)">
    <!-- 上唇 -->
    <path d="M 200 516
             C 250 420, 340 330, 432 330
             C 482 330, 522 358, 560 358
             C 598 358, 638 330, 688 330
             C 780 330, 870 420, 920 516
             C 800 500, 680 492, 560 492
             C 440 492, 320 500, 200 516
             Z"
          fill="#FFFFFF"/>
    <!-- 下唇 -->
    <path d="M 200 516
             C 320 532, 440 540, 560 540
             C 680 540, 800 532, 920 516
             C 862 646, 720 706, 560 706
             C 400 706, 258 646, 200 516
             Z"
          fill="#FFFFFF"/>
    <!-- 開いた口（話し中の隙間） -->
    <path d="M 200 516
             C 320 500, 440 492, 560 492
             C 680 492, 800 500, 920 516
             C 800 532, 680 540, 560 540
             C 440 540, 320 532, 200 516
             Z"
          fill="#6E2410"/>
    <!-- 歯（隙間の中の白いライン） -->
    <rect x="360" y="496" width="400" height="36" rx="18" fill="#FFFFFF"/>
  </g>
</svg>
